name: Build and Test All Apps

on: 
  schedule:
    - cron: "0 6 * * 0"  # cron is UTC, this translates to 10 PM PST Saturday.
  # This lets us trigger the workflow from a browser.
  workflow_dispatch:

jobs:
  android-build-all:
    strategy:
      fail-fast: false
      matrix:
        app_type:  [native, native_kotlin, hybrid_local, hybrid_remote, react_native, MobileSyncExplorerReactNative, AndroidNativeLoginTemplate]
        include:
            - app_type: native
              sfdx: false
            - app_type: native
              sfdx: true
            - app_type: hybrid_local
              sfdx: false
            - app_type: hybrid_local
              sfdx: true
            - app_type: react_native
              sfdx: false
            - app_type: react_native
              sfdx: true
            - app_type: MobileSyncExplorerReactNative
              template: true
            - app_type: AndroidNativeLoginTemplate
              template: true
            - adv_auth: true
              app_type: native
            - complex_hybrid: true
              app_type: hybrid_local
    uses: ./.github/workflows/android-reusable-workflow.yaml
    with:
      app_type: ${{ matrix.app_type }}
      template: ${{ matrix.template }}
      sfdx: ${{ matrix.sfdx }}
      adv_auth: ${{ matrix.adv_auth }}
      complex_hybrid: ${{ matrix.complex_hybrid }}
    secrets: inherit

  ios-build-all:
    if: success() || failure()
    strategy:
      fail-fast: false
      matrix:
        app_type:  [native, native_swift, hybrid_local, hybrid_remote, react_native, MobileSyncExplorerReactNative, MobileSyncExplorerSwift, iOSNativeLoginTemplate]
        ios: ["18.2", "17.4"]
        include:
            - ios: "18.2"
              xcode: "16.2"
            - ios: "17.5"
              xcode: "15.4"
            - app_type: native
              sfdx: false
            - app_type: native
              sfdx: true
            - app_type: hybrid_local
              sfdx: false
            - app_type: hybrid_local
              sfdx: true
            - app_type: react_native
              sfdx: false
            - app_type: react_native
              sfdx: true
            - app_type: MobileSyncExplorerReactNative
              template: true
            - app_type: MobileSyncExplorerSwift
              template: true
            - app_type: iOSNativeLoginTemplate
              template: true
            - adv_auth: true
              app_type: native
            - complex_hybrid: true
              app_type: hybrid_local
    uses: ./.github/workflows/ios-reusable-workflow.yaml
    with:
      app_type: ${{ matrix.app_type }}
      ios: ${{ matrix.ios }}
      xcode: ${{ matrix.xcode }}
      template: ${{ matrix.template }}
      sfdx: ${{ matrix.sfdx }}
      adv_auth: ${{ matrix.adv_auth }}
      complex_hybrid: ${{ matrix.complex_hybrid }}
    secrets: inherit