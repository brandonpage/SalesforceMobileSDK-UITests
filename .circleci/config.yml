aliases:
  - &setup
    name: Setup
    command: ./install.sh
    when: always

  - &install-ant
    name: Install Ant
    command: brew install ant

linux: &linux
  working_directory: ~/SalesforceMobileSDK-UITests
  docker:
    - image: circleci/android:api-28-node
  environment:
    - TERM: "dumb"
    - ADB_INSTALL_TIMEOUT: 15
    - GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"'

mac: &mac
  working_directory: ~/SalesforceMobileSDK-UITests
  macos:
    xcode: "10.2.1"
  shell: /bin/bash --login -eo pipefail

mac_android: &mac_android
  working_directory: ~/SalesforceMobileSDK-UITests
  macos:
    xcode: "10.2.1"
  shell: /bin/bash --login -eo pipefail
  environment:
    TERM: dumb
    JVM_OPTS: -Xmx3200m

version: 2.1
jobs:
  setup-android:
    <<: *mac_android
    steps:
      - checkout
      - run:
          name: Setup environment variables
          command: |
            echo 'export PATH="$PATH:/usr/local/opt/node@8/bin:${HOME}/.yarn/bin:${HOME}/${CIRCLE_PROJECT_REPONAME}/node_modules/.bin:/usr/local/share/android-sdk/tools/bin"' >> $BASH_ENV
            echo 'export ANDROID_HOME="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export ANDROID_SDK_HOME="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export ANDROID_SDK_ROOT="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export QEMU_AUDIO_DRV=none' >> $BASH_ENV
            echo 'export JAVA_HOME=/Library/Java/JavaVirtualMachines/adoptopenjdk-8.jdk/Contents/Home' >> $BASH_ENV
      - run:
          name: Install Android sdk
          command: |
            HOMEBREW_NO_AUTO_UPDATE=1 brew tap homebrew/cask
            HOMEBREW_NO_AUTO_UPDATE=1 brew cask install android-sdk
            HOMEBREW_NO_AUTO_UPDATE=1 brew cask install adoptopenjdk/openjdk/adoptopenjdk8
      - run:
          name: Download Android Dependencies
          command: |
            cd Android
            ./gradlew androidDependencies
      - run: *setup
      - persist_to_workspace:
          root: .
          paths:
            - ./**

  test-android:
    <<: *mac_android
    parameters:
      app_type: 
        type: string
        default: "native"
      api_level: 
        type: integer
        default: 28
    steps:
      - attach_workspace:
          at: ~/SalesforceMobileSDK-UITests
      - run:
          name: Setup environment variables
          command: |
            echo 'export PATH="$PATH:/usr/local/opt/node@8/bin:${HOME}/.yarn/bin:${HOME}/${CIRCLE_PROJECT_REPONAME}/node_modules/.bin:/usr/local/share/android-sdk/tools/bin"' >> $BASH_ENV
            echo 'export ANDROID_HOME="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export ANDROID_SDK_HOME="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export ANDROID_SDK_ROOT="/usr/local/share/android-sdk"' >> $BASH_ENV
            echo 'export QEMU_AUDIO_DRV=none' >> $BASH_ENV
            echo 'export JAVA_HOME=/Library/Java/JavaVirtualMachines/adoptopenjdk-8.jdk/Contents/Home' >> $BASH_ENV
      - run:
          name: Install Android sdk
          command: |
            HOMEBREW_NO_AUTO_UPDATE=1 brew tap homebrew/cask
            HOMEBREW_NO_AUTO_UPDATE=1 brew cask install android-sdk
            HOMEBREW_NO_AUTO_UPDATE=1 brew cask install adoptopenjdk/openjdk/adoptopenjdk8
      - run:
          name: Install Android API << parameters.api_level >> emulator dependencies
          command: (yes | sdkmanager "platform-tools" "platforms;android-<< parameters.api_level >>" "extras;intel;Hardware_Accelerated_Execution_Manager" "build-tools;<< parameters.api_level >>.0.0" "system-images;android-<< parameters.api_level >>;google_apis;x86" "emulator" --verbose) || true
      - run: 
          name: Create Android API << parameters.api_level >> emulator
          command: avdmanager create avd -n AVD -k "system-images;android-<< parameters.api_level >>;google_apis;x86" -d "Nexus 5"
      - run: 
          name: Restart ADB to fix AVD Network Connection
          command: |
            $ANDROID_HOME/platform-tools/adb kill-server
            $ANDROID_HOME/platform-tools/adb start-server
      - run:
          name: Run emulator in background
          command: /usr/local/share/android-sdk/emulator/emulator @AVD -memory 2048 -noaudio 
          background: true
      - run:
          name: Run Java Tests
          command: cd .circleci && fastlane android type:<< parameters.app_type >>
          when: always
      - store_artifacts:
          path: Android/app/build/reports/androidTests/connected/*
          destination: << parameters.app_type >>
      - store_test_results:
          path: Android/app/build/reports/androidTests/connected/com.salesforce.mobilesdk.mobilesdkuitest.Login.html

  test-ios:
      <<: *mac
      parameters:
        ios_version: 
            type: string
        device:
            type: string
      steps:
        - checkout
        - run: *setup
        - run: *install-ant
        - run:
            name: Test Native Objective-C App
            command: cd .circleci && fastlane ios type:native device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Native_Objective_C
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Native_Objective_C
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Native Swift App
            command: xcrun swift -version && cd .circleci && fastlane ios type:native_swift device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Native_Swift
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Native_Swift
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Hybrid Local App
            command: cd .circleci && fastlane ios type:hybrid_local device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Hybrid_Local
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Hybrid_Local
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Hyrbid Remote App
            command: cd .circleci && fastlane ios type:hybrid_remote device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Hybrid_Remote
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Hybrid_Remote
        - store_test_results:
            path: test_output/report.junit


workflows:
  version: 2
  pr-build-all-apps:
    jobs:
      - setup-android
      - test-android:
          app_type: "native"
          api_level: 28
          requires:
            - setup-android
      - test-android:
          app_type: "native_kotlin"
          api_level: 28
          requires:
            - setup-android
      - test-android:
          app_type: "hybrid_local"
          api_level: 28
          requires:
            - setup-android
      - test-android:
          app_type: "hybrid_remote"
          api_level: 28
          requires:
            - setup-android
  
  
  
  
