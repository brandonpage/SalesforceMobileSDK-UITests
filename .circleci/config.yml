aliases:
  - &upgrade-git
    name: Update Git
    command:  |
      git --version
      sudo apt-get update
      sudo apt-get install \
        build-essential flex bison \
        libreadline6-dev zlib1g-dev \
        libssl-dev \
        libcurl4-gnutls-dev \
        libexpat1-dev \
        tcl tk \
        tcl-dev gettext \
        asciidoc \
        docbook2x
      wget https://www.kernel.org/pub/software/scm/git/git-2.13.0.tar.gz
      tar -xvzf git-2.13.0.tar.gz
      cd git-2.13.0
      sudo ./configure
      sudo make && sudo make install

  - &setup
    name: Setup
    command: ./install.sh
    when: always

  - &install-ant
    name: Install Ant
    command: brew install ant

  - &gcloud-auth
    name: Authorize gcloud and set config defaults
    command:  |
        echo $GCLOUD_SERVICE_KEY | base64 --decode --ignore-garbage > ${HOME}/gcloud-service-key.json
        gcloud auth activate-service-account --key-file=${HOME}/gcloud-service-key.json
        gcloud --quiet config set project mobile-apps-firebase-test
        
  - &get-firebase-results
    name: Copy test results data
    command: |
        mkdir -p firebase/results
        gsutil -m cp -r -U "`gsutil ls gs://test-lab-w87i9sz6q175u-kwp8ium6js0zw/UITest-<< parameters.app_type >>-${CIRCLE_BUILD_NUM} | tail -1`*" ./firebase/
        mv firebase/test_result_1.xml firebase/results
    when: always

linux: &linux
  working_directory: ~/SalesforceMobileSDK-UITests
  docker:
    - image: circleci/android:api-28-node
  environment:
    - TERM: "dumb"
    - GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"'

mac: &mac
  working_directory: ~/SalesforceMobileSDK-UITests
  macos:
    xcode: "10.2.1"
  shell: /bin/bash --login -eo pipefail

version: 2.1
jobs:
  test-android:
    <<: *linux
    parameters:
      app_type: 
        type: string
        default: "native"
    steps:
      - checkout
      - run: *upgrade-git
      - run: *setup
      - run: *gcloud-auth
      - run: 
          name: Test << parameters.app_type >> Android
          command: cd .circleci && fastlane android type:<< parameters.app_type >>
          when: always
          no_output_timeout: 900
      - run: *get-firebase-results
      - store_artifacts:
          path: firebase/
          when: always
      - store_test_results:
          path: firebase/results
          when: always

  test-ios:
      <<: *mac
      parameters:
        ios_version: 
            type: string
        device:
            type: string
      steps:
        - checkout
        - run: *setup
        - run: *install-ant
        - run:
            name: Test Native Objective-C App
            command: cd .circleci && fastlane ios type:native device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Native_Objective_C
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Native_Objective_C
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Native Swift App
            command: xcrun swift -version && cd .circleci && fastlane ios type:native_swift device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Native_Swift
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Native_Swift
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Hybrid Local App
            command: cd .circleci && fastlane ios type:hybrid_local device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Hybrid_Local
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Hybrid_Local
        - store_test_results:
            path: test_output/report.junit
        - run:
            name: Test Hyrbid Remote App
            command: cd .circleci && fastlane ios type:hybrid_remote device:"<< parameters.device >>" ios:"<< parameters.ios_version >>"
            when: always
        - store_artifacts:
            path: test_output/report.html
            destination: Hybrid_Remote
        - store_artifacts:
            path: /home/circleci/.fastlane/latest_crash.json
            destination: Hybrid_Remote
        - store_test_results:
            path: test_output/report.junit


workflows:
  version: 2
  pr-build-all-apps:
    jobs:
      - test-android:
          app_type: "native"
      - test-android:
          app_type: "native_kotlin"
      - test-android:
          app_type: "hybrid_local"
      - test-android:
          app_type: "hybrid_remote"
      - test-ios:
          device: "iPhone XR"
          ios_version: "12.2"
      - test-ios:
          device: "iPhone X"
          ios_version: "11.4"

